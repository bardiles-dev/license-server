# CI: lint, tests, análisis de dependencias (OWASP), SonarCloud, SAST (Bandit), DAST (ZAP)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: pip install ruff

      - name: Lint license-server
        run: ruff check license-server/app --output-format=github
        continue-on-error: true

      - name: Lint license-authority
        run: ruff check license-authority/app --output-format=github
        continue-on-error: true

  # Análisis de vulnerabilidades en dependencias (Python / PyPI)
  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [license-server, license-authority]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r ${{ matrix.project }}/requirements.txt

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r ${{ matrix.project }}/requirements.txt --format=json --output=audit-${{ matrix.project }}.json || true
          pip-audit -r ${{ matrix.project }}/requirements.txt || true
        continue-on-error: true

  # OWASP Dependency-Check (CVE/NVD para dependencias)
  owasp-dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/src \
            -v "${{ github.workspace }}/reports":/reports \
            owasp/dependency-check:latest \
            --scan /src \
            --project "license-server-ts" \
            --format SARIF \
            --out /reports \
            --enablePython \
            --failOnCVSS 9
        continue-on-error: true

      - name: Upload OWASP Dependency-Check SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif
        continue-on-error: true

