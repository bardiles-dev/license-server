<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — License Authority</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --bg-page: #f1f5f9;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: "Inter", sans-serif;
            min-height: 100vh;
            background: var(--bg-page);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(30, 41, 59, 0.08);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        .login-title { color: var(--text); font-weight: 600; font-size: 1.25rem; margin-bottom: 0.25rem; }
        .login-subtitle { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
        .form-control { border-radius: 8px; border-color: var(--border); }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15); }
        .btn-login { background: var(--primary); border: none; color: #fff; font-weight: 500; padding: 0.6rem 1.25rem; border-radius: 8px; }
        .btn-login:hover { background: var(--primary-dark); color: #fff; }
        .alert-login { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">Iniciar sesión</h1>
        <p class="login-subtitle">License Authority</p>
        {% if error %}
        <div class="alert alert-login mb-3" role="alert">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label small fw-medium text-secondary">Usuario</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Usuario" autocomplete="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label small fw-medium text-secondary">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña" autocomplete="current-password" required>
            </div>
            <div>
                <button type="submit" class="btn btn-login w-100">Entrar</button>
            </div>
        </form>
    </div>
</body>
</html>
