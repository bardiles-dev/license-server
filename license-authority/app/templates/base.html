<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}License Authority{% endblock %}</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bs-body-bg: #f1f5f9;
            --bs-body-color: #1e293b;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-muted: #64748b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bs-body-bg); color: var(--bs-body-color); min-height: 100vh; }
        .card { background: var(--card-bg); border-color: var(--card-border); color: var(--bs-body-color); }
        .form-control, .form-select { background: #fff; border-color: var(--card-border); color: var(--bs-body-color); }
        .form-control:focus, .form-select:focus { background: #fff; border-color: #0d6efd; color: var(--bs-body-color); box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15); }
        .navbar { background: #fff !important; border-bottom: 1px solid var(--card-border); }
        .navbar-brand { color: var(--bs-body-color) !important; }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container">
            <span class="navbar-brand mb-0">License Authority</span>
            {% if user %}
            <span class="navbar-text text-muted small me-2">{{ user.username }}</span>
            <a class="btn btn-sm btn-outline-secondary" href="/logout">Cerrar sesión</a>
            {% endif %}
        </div>
    </nav>
    <main class="container py-4">
        {% block content %}
        {% endblock %}
    </main>
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
